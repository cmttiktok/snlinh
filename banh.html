<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chúc Mừng Sinh Nhật Vanh</title>
  <link rel="stylesheet" href="banh.css" />
</head>
<body>
  <canvas id="fireworks"></canvas>

  <div class="banner">
    <div id="gift-box-container">
      <div class="gift-box">
        <div class="box-lid"></div>
        <div class="box-body"></div>
      </div>
      <p class="gift-hint">Chạm vào hộp quà để mở điều ước ✨</p>
    </div>

    <div id="hbdText" class="hidden">🎉 CHÚC MỪNG SINH NHẬT VANH 🎉</div>
    
    <div class="slider hidden" style="--quantity: 10">
      <div class="item" style="--position: 1"><img src="images/anh1.jpg" alt="1"></div>
      <div class="item" style="--position: 2"><img src="images/anh2.jpg" alt="2"></div>
      <div class="item" style="--position: 3"><img src="images/anh3.jpg" alt="3"></div>
      <div class="item" style="--position: 4"><img src="images/anh4.jpg" alt="4"></div>
      <div class="item" style="--position: 5"><img src="images/anh5.jpg" alt="5"></div>
      <div class="item" style="--position: 6"><img src="images/anh6.jpg" alt="6"></div>
      <div class="item" style="--position: 7"><img src="images/anh7.jpg" alt="7"></div>
      <div class="item" style="--position: 8"><img src="images/anh8.jpg" alt="8"></div>
      <div class="item" style="--position: 9"><img src="images/anh9.jpg" alt="9"></div>
      <div class="item" style="--position: 10"><img src="images/anh10.jpg" alt="10"></div>
    </div>

    <img src="images/cake.png" alt="Bánh kem sinh nhật" class="cake hidden" />
  </div>

  <audio id="birthday-audio" src="hpbd.mp3" loop></audio>

  <script src="phaohoa.js"></script>
</body>
</html>
